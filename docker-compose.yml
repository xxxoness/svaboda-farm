version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: svaboda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: svaboda
      POSTGRES_PASSWORD: svaboda123
      POSTGRES_DB: svaboda_farm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
